<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic 06 | 量化事件看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Quant Event Platform / Topic 06</p>
          <h1>自結 EPS 股價催化效應</h1>
          <p class="lede">
            這不是研究筆記頁，而是未來要持續追蹤事件、監看交易、回看回測績效的量化觀看平台。
          </p>
          <div class="author-chip">
            <span class="author-name">作者 pioter</span>
            <span class="author-role">分析師+1000</span>
          </div>
        </div>
        <div class="hero-panel">
          <div class="panel-label">Live Monitor</div>
          <div class="panel-number" id="heroMainValue">--</div>
          <div class="panel-note" id="heroMainNote">正在交易事件</div>
        </div>
      </header>

      <nav class="top-nav">
        <a class="nav-link is-active" href="./index.html">正在交易</a>
        <a class="nav-link" href="./past.html">過去事件</a>
        <a class="nav-link" href="./backtest.html">回測績效</a>
      </nav>

      <main class="content-grid">
        <section class="metrics" id="metrics"></section>

        <section class="card wide">
          <div class="section-heading">
            <p class="eyebrow">Live Events</p>
            <h2>正在交易的事件</h2>
          </div>
          <div class="section-intro">首頁最上面只放目前仍在交易窗口內的事件。若沒有符合條件，會顯示空狀態。</div>
          <div class="event-list" id="ongoingList"></div>
        </section>

        <section class="card wide">
          <div class="section-heading">
            <p class="eyebrow">Upcoming Queue</p>
            <h2>未來事件</h2>
          </div>
          <div class="section-intro">這一區預留給尚未進入交易視窗的事件。目前資料集還沒有未來樣本。</div>
          <div class="event-list" id="upcomingList"></div>
        </section>
      </main>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
