<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic 06 | 戰情室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Quant Event Platform / Topic 06</p>
          <h1>戰情室</h1>
          <p class="lede">只保留真正有用的東西：目前持股、最佳策略、與最能打的回測結果。</p>
          <div class="author-chip">
            <span class="author-name">pioter</span>
            <span class="author-role">分析師+1000</span>
          </div>
        </div>
        <div class="hero-panel">
          <div class="panel-label">Live Monitor</div>
          <div class="panel-number" id="heroMainValue">--</div>
          <div class="panel-note" id="heroMainNote">等待最新回測資料</div>
        </div>
      </header>

      <nav class="top-nav">
        <a class="nav-link is-active" href="./index.html">正在交易</a>
        <a class="nav-link" href="./past.html">過去事件</a>
        <a class="nav-link" href="./backtest.html">回測績效</a>
      </nav>

      <main class="content-grid">
        <section class="metrics" id="metrics"></section>
        <section class="card wide">
          <div class="section-heading">
            <p class="eyebrow">Battle Room</p>
            <h2>目前持股 / 最佳策略</h2>
          </div>
          <div class="battle-grid">
            <div class="battle-panel">
              <div class="panel-title">目前持股</div>
              <div class="panel-note">若本月尚未形成持倉，這裡會顯示空狀態。</div>
              <div class="holdings-list" id="currentHoldings"></div>
            </div>
            <div class="battle-panel">
              <div class="panel-title">最佳策略</div>
              <div class="panel-note">目前保留的最佳暴力回測組合。</div>
              <div class="strategy-highlight" id="bestStrategyCard"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
