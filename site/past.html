<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic 06 | 過去事件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="past">
    <div class="page-shell">
      <header class="subhero">
        <div>
          <p class="eyebrow">Archive</p>
          <h1>過去事件</h1>
          <p class="lede">所有已經結束交易窗口，或目前只作為歷史樣本保存的事件都放這裡。</p>
        </div>
        <div class="author-chip compact">
          <span class="author-name">作者 pioter</span>
          <span class="author-role">分析師+1000</span>
        </div>
      </header>

      <nav class="top-nav">
        <a class="nav-link" href="./index.html">正在交易</a>
        <a class="nav-link is-active" href="./past.html">過去事件</a>
        <a class="nav-link" href="./backtest.html">回測績效</a>
      </nav>

      <main class="content-grid">
        <section class="card wide">
          <div class="section-heading">
            <p class="eyebrow">History Board</p>
            <h2>歷史事件清單</h2>
          </div>
          <div class="filters">
            <button class="filter-chip is-active" data-filter="all">全部</button>
            <button class="filter-chip" data-filter="priced">有價格</button>
            <button class="filter-chip" data-filter="missing_price">缺價格</button>
            <button class="filter-chip" data-filter="A">A 級</button>
            <button class="filter-chip" data-filter="B">B 級</button>
          </div>
          <div class="event-list" id="pastList"></div>
        </section>

        <section class="card wide">
          <div class="section-heading">
            <p class="eyebrow">Coverage Gap</p>
            <h2>待補價格資料股票</h2>
          </div>
          <div class="missing-grid" id="missingGrid"></div>
        </section>
      </main>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
